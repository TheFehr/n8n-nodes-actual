services:
  actual:
    image: actualbudget/actual-server:latest
    ports:
      - "5006:5006"
    volumes:
      - actual_data:/data

  n8n:
    build:
      context: .
      dockerfile: Dockerfile.test-n8n
      args:
        N8N_IMAGE: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      - N8N_API_KEY=test_api_key
      - N8N_METRICS_ENABLED=true
      - N8N_TASK_BROKER_PORT=5680
    volumes:
      - .:/home/node/custom-nodes:ro
      - n8n_data:/home/node/.n8n
    # Copy the compiled dist into the package dir installed at image build time via
    # n8n's real --ignore-scripts=true community-node install flow (see
    # Dockerfile.test-n8n) — avoids mounting host node_modules, which have glibc
    # binaries incompatible with Alpine and wouldn't reflect the ignore-scripts install.
    entrypoint: /bin/sh -c "
      cp -r /home/node/custom-nodes/dist /n8n-nodes-actual/dist &&
      mkdir -p /home/node/.n8n/nodes/node_modules &&
      rm -f /home/node/.n8n/nodes/node_modules/n8n-nodes-actual &&
      ln -sf /n8n-nodes-actual /home/node/.n8n/nodes/node_modules/n8n-nodes-actual &&
      n8n"
    depends_on:
      - actual

volumes:
  actual_data:
  n8n_data:
